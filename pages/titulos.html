<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Configurações -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../img/titulos.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/titulos.css">
    <title>Títulos do LeBron James</title>
</head>
<body>
    <!-- Cabeçalho -->
    <header>
        <a href="../index.html" class="titulo">
            <h1>LeBron James</h1>
        </a>
        <nav>
            <a href="biografia.html">Quem é</a>
            <a href="carreira.html">Carreira</a>
            <a href="titulos.html">Títulos</a>
            <a href="estatisticas.html">Estatísticas</a>
        </nav>
        <hr>
    </header>

    <main>
        <!-- MVP -->
        <section>
            <h2>MVP da Temporada</h2>
            <div class="grid">
                <div class="card">
                    <img src="../img/Lebron-2009.png" alt="MVP 2009">
                    <p>2009</p>
                </div>

                <div class="card">
                    <img src="../img/Lebron-2010.png" alt="MVP 2010">
                    <p>2010</p>
                </div>

                <div class="card">
                    <img src="../img/Lebron-2012.png" alt="MVP 2012">
                    <p>2012</p>
                </div>

                <div class="card">
                    <img src="../img/Lebron-2013.png" alt="MVP 2013">
                    <p>2013</p>
                </div>
            </div>
        </section>

        <!-- NBA -->
        <section>
            <h2>Títulos da NBA</h2>
            <div class="grid">
                <div class="card">
                    <img src="../img/NBA-2012.png" alt="NBA 2012">
                    <p>2012</p>
                </div>

                <div class="card">
                    <img src="../img/NBA-2013.png" alt="NBA 2013">
                    <p>2013</p>
                </div>

                <div class="card">
                    <img src="../img/NBA-2016.png" alt="NBA 2016">
                    <p>2016</p>
                </div>

                <div class="card">
                    <img src="../img/NBA-2020.png" alt="NBA 2020">
                    <p>2020</p>
                </div>
            </div>
        </section>

        <!-- Olimpíadas -->
        <section>
            <h2>Medalhas de Ouro Olímpicas</h2>
            <div class="grid">
                <div class="card">
                    <img src="../img/Olimpíadas-2008.png" alt="Olimpíadas 2008">
                    <p>2008</p>
                </div>

                <div class="card">
                    <img src="../img/Olimpíadas-2012.png" alt="Olimpíadas 2012">
                    <p>2012</p>
                </div>

                <div class="card">
                    <img src="../img/Olimpíadas-2024.png" alt="Olimpíadas 2024">
                    <p>2024</p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
